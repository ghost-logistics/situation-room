<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Guard - Geopolitical Intelligence</title>
  
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: #0a0e14;
      color: #ffffff;
      overflow: hidden;
    }

    #map {
      width: 100vw;
      height: 100vh;
    }

    /* News Modal */
    .news-modal {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90%;
      max-width: 700px;
      max-height: 85vh;
      background: rgba(10, 14, 20, 0.98);
      border: 2px solid rgba(100, 200, 255, 0.4);
      border-radius: 12px;
      z-index: 10000;
      overflow: hidden;
      backdrop-filter: blur(20px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
    }

    .news-modal.active {
      display: flex;
      flex-direction: column;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translate(-50%, -45%);
      }
      to {
        opacity: 1;
        transform: translate(-50%, -50%);
      }
    }

    .modal-header {
      padding: 20px 25px;
      border-bottom: 1px solid rgba(100, 200, 255, 0.3);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(100, 200, 255, 0.05);
    }

    .modal-title {
      font-size: 18px;
      color: #64c8ff;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .modal-location {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.6);
      margin-top: 5px;
    }

    .close-btn {
      background: none;
      border: none;
      color: #ff6b9d;
      font-size: 28px;
      cursor: pointer;
      padding: 0;
      width: 35px;
      height: 35px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .close-btn:hover {
      color: #ff8bb3;
      transform: scale(1.1);
    }

    .modal-content {
      flex: 1;
      overflow-y: auto;
      padding: 25px;
    }

    .loading-indicator {
      text-align: center;
      padding: 40px;
      color: #64c8ff;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(100, 200, 255, 0.2);
      border-top-color: #64c8ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .news-item {
      margin-bottom: 25px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(100, 200, 255, 0.1);
      cursor: pointer;
      transition: all 0.2s;
    }

    .news-item:hover {
      background: rgba(100, 200, 255, 0.05);
      padding: 10px;
      margin-left: -10px;
      margin-right: -10px;
      border-radius: 6px;
    }

    .news-item:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .news-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      font-size: 11px;
    }

    .news-source {
      color: #64c8ff;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      max-width: 60%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .news-time {
      color: rgba(255, 255, 255, 0.4);
    }

    .news-title {
      font-size: 15px;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .news-excerpt {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.7);
      line-height: 1.6;
      margin-bottom: 10px;
    }

    .news-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .news-tag {
      padding: 3px 8px;
      background: rgba(100, 200, 255, 0.15);
      border: 1px solid rgba(100, 200, 255, 0.3);
      border-radius: 3px;
      font-size: 10px;
      color: #64c8ff;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.7);
      z-index: 9999;
    }

    .modal-overlay.active {
      display: block;
    }

    .info-panel {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: rgba(10, 14, 20, 0.95);
      border: 1px solid rgba(100, 200, 255, 0.3);
      border-radius: 8px;
      padding: 15px 20px;
      backdrop-filter: blur(10px);
      z-index: 1000;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.8);
    }

    .info-panel strong {
      color: #64c8ff;
    }

    .gdelt-badge {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(10, 14, 20, 0.95);
      border: 1px solid rgba(100, 200, 255, 0.3);
      border-radius: 8px;
      padding: 10px 15px;
      backdrop-filter: blur(10px);
      z-index: 1000;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.7);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .gdelt-badge .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #00ff88;
      box-shadow: 0 0 10px rgba(0, 255, 136, 0.8);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Leaflet popup customization */
    .leaflet-popup-content-wrapper {
      background: rgba(10, 14, 20, 0.95);
      color: #ffffff;
      border: 1px solid rgba(100, 200, 255, 0.3);
      border-radius: 8px;
    }

    .leaflet-popup-tip {
      background: rgba(10, 14, 20, 0.95);
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(100, 200, 255, 0.05);
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(100, 200, 255, 0.3);
      border-radius: 4px;
    }

    /* Mobile responsive */
    @media (max-width: 768px) {
      .news-modal {
        width: 95%;
        max-height: 90vh;
      }

      .modal-header {
        padding: 15px;
      }

      .modal-title {
        font-size: 16px;
      }

      .modal-content {
        padding: 15px;
      }

      .news-title {
        font-size: 14px;
      }

      .info-panel {
        font-size: 11px;
        padding: 10px 15px;
        bottom: 10px;
        left: 10px;
      }

      .gdelt-badge {
        font-size: 10px;
        padding: 8px 12px;
        top: 10px;
        right: 10px;
      }
    }
  </style>
</head>
<body>
  <div id="map"></div>
  
  <div class="info-panel">
    <strong>Click anywhere</strong> on the map to view real-time geopolitical news
  </div>

  <div class="gdelt-badge">
    <div class="status-dot"></div>
    <span>GDELT Live • Auto-Translate</span>
  </div>

  <!-- Modal Overlay -->
  <div class="modal-overlay" id="modal-overlay" onclick="closeNewsModal()"></div>

  <!-- News Modal -->
  <div class="news-modal" id="news-modal">
    <div class="modal-header">
      <div>
        <div class="modal-title">
          <span>🌍</span>
          <span id="modal-region">Loading...</span>
        </div>
        <div class="modal-location" id="modal-coords">--</div>
      </div>
      <button class="close-btn" onclick="closeNewsModal()">×</button>
    </div>
    <div class="modal-content" id="modal-news">
      <div class="loading-indicator">
        <div class="spinner"></div>
        <div>Loading geopolitical intelligence...</div>
      </div>
    </div>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  
  <script>
    // Initialize map with satellite imagery
    const map = L.map('map', {
      center: [20, 0],
      zoom: 3,
      zoomControl: true,
      minZoom: 2,
      maxZoom: 18
    });

    // Satellite imagery layer using Esri World Imagery (free, no API key needed)
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
      attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community',
      maxZoom: 18
    }).addTo(map);

    // Optional: Add labels overlay
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OpenStreetMap, CartoDB',
      subdomains: 'abcd',
      maxZoom: 19,
      opacity: 0.7
    }).addTo(map);

    // Reverse geocoding - get location info from coordinates
    async function reverseGeocode(lat, lon) {
      try {
        const response = await fetch(
          `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=10&addressdetails=1`,
          {
            headers: {
              'User-Agent': 'SituationRoomApp/1.0'
            }
          }
        );
        const data = await response.json();
        
        return {
          country: data.address?.country || 'Unknown Region',
          region: data.address?.state || data.address?.county || data.address?.city || '',
          displayName: data.display_name || `${lat.toFixed(4)}, ${lon.toFixed(4)}`
        };
      } catch (error) {
        console.error('Geocoding error:', error);
        return {
          country: 'Unknown Region',
          region: '',
          displayName: `${lat.toFixed(4)}, ${lon.toFixed(4)}`
        };
      }
    }

    // Translate text to English using MyMemory Translation API (free, no key needed)
    async function translateToEnglish(text, sourceLang = 'auto') {
      try {
        // MyMemory free translation API (1000 requests/day, no key required)
        const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${sourceLang}|en`;
        
        const response = await fetch(url);
        const data = await response.json();
        
        if (data.responseStatus === 200 && data.responseData && data.responseData.translatedText) {
          return data.responseData.translatedText;
        }
        
        // If translation fails, return original
        return text;
      } catch (error) {
        console.error('Translation error:', error);
        return text; // Return original if translation fails
      }
    }

    // Detect if text is likely non-English (simple heuristic)
    function isLikelyNonEnglish(text) {
      // Check for common non-ASCII characters in other languages
      const nonEnglishPattern = /[\u0080-\uFFFF]/;
      return nonEnglishPattern.test(text);
    }

    // Get real news from GDELT
    async function getNewsForLocation(country, region) {
      try {
        // Build search query - use region + country for better results
        const searchTerms = [];
        if (region && region.trim()) searchTerms.push(region);
        if (country && country.trim()) searchTerms.push(country);
        
        const searchQuery = searchTerms.join(' ');
        
        if (!searchQuery || searchQuery === 'Unknown Region') {
          return [{
            source: 'No Location Data',
            time: 'N/A',
            title: 'Unable to determine location',
            excerpt: 'Please click on a land area with identifiable location data.',
            tags: ['error'],
            url: null
          }];
        }
        
        // GDELT Doc API - gets recent articles mentioning the location (all languages, will translate)
        const url = `https://api.gdeltproject.org/api/v2/doc/doc?query=${encodeURIComponent(searchQuery)}&mode=artlist&maxrecords=15&format=json&sort=datedesc`;
        
        console.log('Fetching GDELT news for:', searchQuery);
        console.log('GDELT URL:', url);
        
        const response = await fetch(url);
        
        if (!response.ok) {
          throw new Error(`GDELT API error: ${response.status}`);
        }
        
        const data = await response.json();
        
        console.log('GDELT response:', data);
        
        if (!data.articles || data.articles.length === 0) {
          // Try just the country if region search failed
          if (region) {
            console.log('No results for region, trying country only...');
            return await getNewsForLocation(country, null);
          }
          
          return [{
            source: 'GDELT',
            time: 'N/A',
            title: `No recent news found for ${searchQuery}`,
            excerpt: 'Try clicking on a major city or region with more news coverage.',
            tags: ['no-results'],
            url: null
          }];
        }
        
        // Transform GDELT articles to our format - with translation
        const articlePromises = data.articles.slice(0, 8).map(async article => {
          // Parse date
          const dateStr = article.seendate; // Format: YYYYMMDDTHHMMSSZ
          const year = parseInt(dateStr.substring(0, 4));
          const month = parseInt(dateStr.substring(4, 6)) - 1;
          const day = parseInt(dateStr.substring(6, 8));
          const hour = parseInt(dateStr.substring(9, 11));
          const minute = parseInt(dateStr.substring(11, 13));
          const second = parseInt(dateStr.substring(13, 15));
          
          const date = new Date(Date.UTC(year, month, day, hour, minute, second));
          const now = new Date();
          const diffMs = now - date;
          const diffMins = Math.floor(diffMs / 60000);
          const diffHours = Math.floor(diffMins / 60);
          const diffDays = Math.floor(diffHours / 24);
          
          let timeAgo;
          if (diffMins < 1) {
            timeAgo = 'Just now';
          } else if (diffMins < 60) {
            timeAgo = `${diffMins}m ago`;
          } else if (diffHours < 24) {
            timeAgo = `${diffHours}h ago`;
          } else {
            timeAgo = `${diffDays}d ago`;
          }
          
          // Extract domain from URL for source
          let source = 'Unknown Source';
          try {
            const urlObj = new URL(article.url);
            source = urlObj.hostname.replace('www.', '').replace('.com', '').replace('.org', '').replace('.net', '');
            // Capitalize first letter
            source = source.charAt(0).toUpperCase() + source.slice(1);
          } catch (e) {
            source = article.domain || 'News Source';
          }
          
          // Translate title if non-English
          let title = article.title;
          if (isLikelyNonEnglish(title)) {
            console.log('Translating non-English title:', title);
            title = await translateToEnglish(title);
            console.log('Translated to:', title);
          }
          
          // Generate tags from title
          const tags = [];
          const titleLower = title.toLowerCase();
          
          if (titleLower.includes('economy') || titleLower.includes('economic') || titleLower.includes('trade') || titleLower.includes('market')) tags.push('economy');
          if (titleLower.includes('military') || titleLower.includes('defense') || titleLower.includes('security') || titleLower.includes('army')) tags.push('security');
          if (titleLower.includes('diplomacy') || titleLower.includes('diplomatic') || titleLower.includes('foreign') || titleLower.includes('ambassador')) tags.push('diplomacy');
          if (titleLower.includes('conflict') || titleLower.includes('war') || titleLower.includes('attack') || titleLower.includes('violence')) tags.push('conflict');
          if (titleLower.includes('election') || titleLower.includes('political') || titleLower.includes('government') || titleLower.includes('president')) tags.push('politics');
          if (titleLower.includes('climate') || titleLower.includes('environment') || titleLower.includes('green')) tags.push('environment');
          if (titleLower.includes('tech') || titleLower.includes('ai') || titleLower.includes('cyber')) tags.push('technology');
          
          if (tags.length === 0) tags.push('news');
          
          return {
            source: source,
            time: timeAgo,
            title: title, // Use translated title
            excerpt: title, // GDELT doesn't provide excerpts, use translated title
            url: article.url,
            tags: tags
          };
        });
        
        // Wait for all translations to complete
        return await Promise.all(articlePromises);
        
      } catch (error) {
        console.error('Error fetching news from GDELT:', error);
        return [{
          source: 'Error',
          time: 'N/A',
          title: 'Unable to load news at this time',
          excerpt: 'Please check your internet connection and try again. GDELT API may be temporarily unavailable.',
          tags: ['error'],
          url: null
        }];
      }
    }

    // Show news modal
    async function showNews(lat, lon) {
      const modal = document.getElementById('news-modal');
      const overlay = document.getElementById('modal-overlay');
      const modalRegion = document.getElementById('modal-region');
      const modalCoords = document.getElementById('modal-coords');
      const modalNews = document.getElementById('modal-news');
      
      // Show modal with loading state
      modal.classList.add('active');
      overlay.classList.add('active');
      modalRegion.textContent = 'Loading...';
      modalCoords.textContent = `${lat.toFixed(4)}°, ${lon.toFixed(4)}°`;
      modalNews.innerHTML = `
        <div class="loading-indicator">
          <div class="spinner"></div>
          <div>Fetching real-time news from GDELT...</div>
        </div>
      `;
      
      // Get location info
      const location = await reverseGeocode(lat, lon);
      
      // Update title
      const displayTitle = location.region 
        ? `${location.region}, ${location.country}`
        : location.country;
      modalRegion.textContent = displayTitle;
      
      // Get real news from GDELT for this location
      const news = await getNewsForLocation(location.country, location.region);
      
      // Render news (with clickable links)
      modalNews.innerHTML = news.map(item => `
        <div class="news-item" ${item.url ? `onclick="window.open('${item.url}', '_blank')"` : ''} style="${item.url ? 'cursor: pointer;' : 'cursor: default;'}">
          <div class="news-meta">
            <span class="news-source">${item.source}</span>
            <span class="news-time">${item.time}</span>
          </div>
          <div class="news-title">${item.title}</div>
          <div class="news-tags">
            ${item.tags.map(tag => `<span class="news-tag">${tag}</span>`).join('')}
          </div>
        </div>
      `).join('');
    }

    // Close modal
    function closeNewsModal() {
      document.getElementById('news-modal').classList.remove('active');
      document.getElementById('modal-overlay').classList.remove('active');
    }

    // Handle map clicks
    map.on('click', function(e) {
      showNews(e.latlng.lat, e.latlng.lng);
    });

    // Close modal on escape key
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        closeNewsModal();
      }
    });
  </script>
</body>
</html>
